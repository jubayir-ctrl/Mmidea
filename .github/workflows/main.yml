name: Surveillance stock PortaSplit

on:
  schedule:
    # Toutes les 30 min. Chaque execution vit ~50 min et verifie toutes les
    # 15 min : cadence volontairement DOUCE pour ne pas se faire bloquer.
    - cron: '11,41 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Test Telegram ? (oui = message de test)'
        type: choice
        options:
          - 'non'
          - 'oui'
        default: 'non'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # curl-cffi imite la signature technique de Chrome : c'est ce qui permet
      # de passer les protections anti-robot (Cloudflare) qui bloquaient Python.
      - run: pip install "curl-cffi>=0.6" requests
      - name: Surveiller en boucle
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_PING: "${{ github.event.inputs.test == 'oui' && '1' || '' }}"
        run: |
          python - <<'PYEOF'
          import json, os, random, sys, time
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import urlparse

          import requests                      # pour Telegram uniquement
          from curl_cffi import requests as nav  # navigateur imite (anti-blocage)

          # ===== TES PAGES SURVEILLEES ==============================
          # NE JAMAIS utiliser "Ajouter au panier" ni "EN STOCK" comme marqueur :
          # ces textes existent dans le HTML meme quand le produit est epuise.
          TARGETS = [
              {
                  "name": "Midea PortaSplit — ManoMano",
                  "url": "https://www.manomano.fr/p/midea-climatiseur-split-mobile-reversible-froid-chaud-3500w12000btu-wifi-deshumidificateur-ventilateur-jusqua-40m2-kit-fenetre-inclus-83810402",
                  "out_of_stock_marker": "Produit épuisé",
              },
              {
                  "name": "Midea PortaSplit — Optimea (officiel)",
                  "url": "https://www.optimea.fr/product/climatiseur-split-mobile-midea/",
                  "out_of_stock_marker": "out of stock",
              },
          ]
          # ==========================================================

          BOUCLE_MINUTES = 50     # duree de vie de cette execution
          INTERVALLE_SEC = 900    # 15 min entre deux verifications (cadence douce)
          SEUIL_BLOCAGE  = 4      # nb d'echecs consecutifs avant de te prevenir

          STATE_FILE = Path("state.json")
          TOKEN   = os.environ.get("TELEGRAM_TOKEN", "")
          CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID", "")

          def send_telegram(text):
              if not TOKEN or not CHAT_ID:
                  print("!! Secrets Telegram manquants — alerte non envoyee :", text)
                  return
              try:
                  r = requests.post(
                      f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                      json={"chat_id": CHAT_ID, "text": text},
                      timeout=20,
                  )
                  if r.status_code != 200:
                      print("!! Erreur Telegram :", r.status_code, r.text[:200])
              except Exception as e:
                  print("!! Telegram injoignable :", e)

          def in_stock(html, t):
              low = html.lower()
              if "in_stock_marker" in t:
                  return t["in_stock_marker"].lower() in low
              if "out_of_stock_marker" in t:
                  return t["out_of_stock_marker"].lower() not in low
              return None

          def check(t):
              """Retourne True (dispo), False (rupture) ou None (echec/bloque)."""
              try:
                  r = nav.get(
                      t["url"],
                      impersonate="chrome",       # <-- la cle : on ressemble a Chrome
                      timeout=40,
                      headers={"Accept-Language": "fr-FR,fr;q=0.9"},
                  )
              except Exception as e:
                  print(f"      [{t['name']}] echec reseau : {type(e).__name__}")
                  return None
              if r.status_code != 200:
                  print(f"      [{t['name']}] HTTP {r.status_code} — bloque/indispo.")
                  return None
              return in_stock(r.text, t)

          def lire_etat():
              try:
                  return json.loads(STATE_FILE.read_text(encoding="utf-8"))
              except (FileNotFoundError, json.JSONDecodeError):
                  return {}

          def main():
              if os.environ.get("TEST_PING"):
                  send_telegram("Test OK : le surveillant de stock est bien configure.")
                  return 0

              etat = lire_etat()
              modifie = False
              labels = {True: "EN STOCK", False: "rupture", None: "inconnu"}

              fin = time.time() + BOUCLE_MINUTES * 60
              tour = 0
              while True:
                  tour += 1
                  print(f"--- tour {tour} ({datetime.now(timezone.utc):%H:%M:%S} UTC) ---")
                  for t in TARGETS:
                      nom = t["name"]
                      e = etat.setdefault(nom, {})
                      res = check(t)
                      print(f"      [{nom}] {labels[res]}")

                      if res is None:
                          # --- echec : on compte, et on TE PREVIENT si ca dure ---
                          e["fails"] = e.get("fails", 0) + 1
                          if e["fails"] >= SEUIL_BLOCAGE and not e.get("blocage_signale"):
                              send_telegram(
                                  "⚠️ SURVEILLANCE AVEUGLE\n"
                                  f"{nom}\nLe site bloque mes requetes : je ne peux plus "
                                  "voir le stock. Verifie manuellement en attendant."
                              )
                              e["blocage_signale"] = True
                              modifie = True
                      else:
                          # --- acces OK : on repart proprement ---
                          if e.get("blocage_signale"):
                              send_telegram(f"✅ Acces retabli : je resurveille {nom}.")
                              modifie = True
                          e["fails"] = 0
                          e["blocage_signale"] = False

                          if res is True and e.get("in_stock") is not True:
                              send_telegram(
                                  f"🟢 EN STOCK : {nom}\n{urlparse(t['url']).netloc}\n{t['url']}"
                              )
                          if e.get("in_stock") != res:
                              modifie = True
                          e["in_stock"] = res
                          e["checked_at"] = int(time.time())

                      time.sleep(random.uniform(3, 9))   # rythme irregulier = moins robotique

                  if time.time() >= fin:
                      break
                  pause = INTERVALLE_SEC + random.uniform(-60, 60)
                  time.sleep(min(pause, max(0, fin - time.time())))

              if modifie:
                  STATE_FILE.write_text(
                      json.dumps(etat, indent=2, ensure_ascii=False), encoding="utf-8"
                  )
                  print("state.json mis a jour.")
              print(f"Fin : {tour} tours effectues.")
              return 0

          sys.exit(main())
          PYEOF
      - name: Sauvegarder l'etat
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "stock-bot"
            git config user.email "stock-bot@users.noreply.github.com"
            git add state.json
            git commit -m "maj etat stock [skip ci]"
            git pull --rebase --autostash || true
            git push || echo "push ignore (execution concurrente)"
          fi

name: Surveillance stock PortaSplit

on:
  schedule:
    # On demande le lancement toutes les 30 min. GitHub retarde/saute souvent,
    # mais chaque execution vit ~50 min et verifie en boucle toutes les 5 min :
    # les executions se chevauchent, donc la surveillance reste continue.
    - cron: '3,33 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Test Telegram ? (choisir "oui" pour recevoir un message de test)'
        type: choice
        options:
          - 'non'
          - 'oui'
        default: 'non'

permissions:
  contents: write

# Pas de "concurrency" ici : on VEUT que les executions puissent se chevaucher,
# sinon un lancement en retard annulerait celui qui est en train de surveiller.

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Surveiller en boucle (50 min, verif toutes les 5 min)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_PING: "${{ github.event.inputs.test == 'oui' && '1' || '' }}"
        run: |
          python - <<'PYEOF'
          import json, os, sys, time
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import urlparse
          import requests

          # ===== A EDITER : tes pages a surveiller =====
          TARGETS = [
              {
                  "name": "Midea PortaSplit — ManoMano",
                  "url": "https://www.manomano.fr/p/midea-climatiseur-split-mobile-reversible-froid-chaud-3500w12000btu-wifi-deshumidificateur-ventilateur-jusqua-40m2-kit-fenetre-inclus-83810402",
                  "out_of_stock_marker": "Produit épuisé",
              },
          ]
          # =============================================

          BOUCLE_MINUTES = 50      # duree de vie de cette execution
          INTERVALLE_SEC = 300     # 5 min entre deux verifications

          STATE_FILE = Path("state.json")
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile Safari/604.1",
              "Accept-Language": "fr-FR,fr;q=0.9,en;q=0.8",
          }
          TOKEN = os.environ.get("TELEGRAM_TOKEN", "")
          CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID", "")

          def send_telegram(text):
              if not TOKEN or not CHAT_ID:
                  print("!! Secrets Telegram manquants — alerte non envoyee :", text)
                  return
              try:
                  r = requests.post(
                      f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                      json={"chat_id": CHAT_ID, "text": text},
                      timeout=20,
                  )
                  if r.status_code != 200:
                      print("!! Erreur Telegram :", r.status_code, r.text[:200])
              except requests.RequestException as e:
                  print("!! Telegram injoignable :", e)

          def in_stock(html, t):
              low = html.lower()
              if "in_stock_marker" in t:
                  return t["in_stock_marker"].lower() in low
              if "out_of_stock_marker" in t:
                  return t["out_of_stock_marker"].lower() not in low
              return None

          def check(t):
              try:
                  r = requests.get(t["url"], headers=HEADERS, timeout=30)
              except requests.RequestException as e:
                  print(f"      [{t['name']}] echec reseau : {e}")
                  return None
              if r.status_code != 200:
                  print(f"      [{t['name']}] HTTP {r.status_code} — ignore ce tour.")
                  return None
              return in_stock(r.text, t)

          def lire_etat():
              try:
                  return json.loads(STATE_FILE.read_text(encoding="utf-8"))
              except (FileNotFoundError, json.JSONDecodeError):
                  return {}

          def main():
              if os.environ.get("TEST_PING"):
                  send_telegram("Test OK : le surveillant de stock est bien configure.")
                  return 0

              # Etat partage entre executions (evite de re-alerter en boucle).
              etat = lire_etat()
              # Memoire locale a cette execution : evite de renvoyer une alerte
              # a chaque tour de boucle si le produit reste en stock.
              deja_alerte = {n: (v.get("in_stock") is True) for n, v in etat.items()}
              modifie = False
              labels = {True: "EN STOCK", False: "rupture", None: "inconnu"}

              fin = time.time() + BOUCLE_MINUTES * 60
              tour = 0
              while True:
                  tour += 1
                  horo = datetime.now(timezone.utc).strftime("%H:%M:%S")
                  print(f"--- tour {tour} ({horo} UTC) ---")
                  for t in TARGETS:
                      nom = t["name"]
                      etat_actuel = check(t)
                      print(f"      [{nom}] {labels[etat_actuel]}")

                      if etat_actuel is True and not deja_alerte.get(nom):
                          send_telegram(
                              f"🟢 EN STOCK : {nom}\n{urlparse(t['url']).netloc}\n{t['url']}"
                          )
                          deja_alerte[nom] = True
                      elif etat_actuel is False:
                          deja_alerte[nom] = False

                      if etat_actuel is not None and etat_actuel != etat.get(nom, {}).get("in_stock"):
                          etat[nom] = {"in_stock": etat_actuel, "checked_at": int(time.time())}
                          modifie = True
                      time.sleep(2)

                  if time.time() >= fin:
                      break
                  # On ne depasse jamais la fin prevue.
                  time.sleep(min(INTERVALLE_SEC, max(0, fin - time.time())))

              if modifie:
                  STATE_FILE.write_text(
                      json.dumps(etat, indent=2, ensure_ascii=False), encoding="utf-8"
                  )
                  print("state.json mis a jour.")
              print(f"Fin : {tour} verifications effectuees.")
              return 0

          sys.exit(main())
          PYEOF
      - name: Sauvegarder l'etat
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "stock-bot"
            git config user.email "stock-bot@users.noreply.github.com"
            git add state.json
            git commit -m "maj etat stock [skip ci]"
            git pull --rebase --autostash || true
            git push || echo "push ignore (execution concurrente)"
          fi
